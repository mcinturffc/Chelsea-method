<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Chelsea">
<meta name="theme-color" content="#FFFBEF">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<title>The Chelsea Method</title>
<style>
:root{
  --bg:#FFFBEF; --card:#FFFFFF; --butter:#FFF3C9; --butter2:#FFE99F;
  --gold:#E3B23C; --gold-dk:#B8860B; --ink:#4A3F2A; --ink-soft:#8A7B5C;
  --blush:#F9D5DC; --blush-dk:#D98A9C; --green:#9CC5A1; --green-dk:#5B8C5F;
  --shadow:0 1px 2px rgba(190,160,80,.12), 0 10px 26px rgba(190,160,80,.22), inset 0 1.5px 0 rgba(255,255,255,.95);
  --r:20px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;color:var(--ink);
  background:linear-gradient(175deg,#FFFDF4 0%,#FFF9E4 40%,#FBEFC9 100%) fixed;
  font-family:'Nunito',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  font-size:16px; overscroll-behavior-y:contain;}
body{padding-bottom:calc(84px + env(safe-area-inset-bottom));}
h1,h2,h3,.serif{font-family:'Caveat',cursive;}
.hdr h1{text-shadow:0 1px 0 #fff, 0 3px 8px rgba(190,160,80,.3);
  text-decoration:underline wavy rgba(227,178,60,.5);text-underline-offset:7px;}
#app .card:nth-of-type(odd),#app .block:nth-of-type(odd){transform:rotate(-.4deg);}
#app .card:nth-of-type(even),#app .block:nth-of-type(even){transform:rotate(.35deg);}
.card{position:relative;}
.card.soft::before,.card.blush::before{content:"";position:absolute;top:-9px;left:50%;
  width:76px;height:20px;margin-left:-38px;transform:rotate(-3deg);border-radius:2px;
  background:rgba(233,185,73,.32);box-shadow:0 1px 3px rgba(150,110,30,.18);
  border-left:1px dashed rgba(255,255,255,.7);border-right:1px dashed rgba(255,255,255,.7);}
.card.blush::before{background:rgba(240,169,187,.35);}
.avatar{width:48px;height:48px;border-radius:16px;border:2.5px solid #fff;flex:none;
  box-shadow:0 4px 10px rgba(190,160,80,.35);transform:rotate(-4deg);}
#app{max-width:520px;margin:0 auto;padding:14px 14px 0;}
.card{background:linear-gradient(170deg,#FFFFFF,#FFFDF2);border-radius:var(--r);box-shadow:var(--shadow);
  border:1px solid rgba(230,210,150,.5);
  padding:16px;margin-bottom:14px;}
.card.soft{background:linear-gradient(160deg,#FFFDF4,var(--butter));}
.card.blush{background:linear-gradient(160deg,#FFF9F5,var(--blush));
  border-color:rgba(230,170,185,.45);
  box-shadow:0 1px 2px rgba(200,130,150,.12), 0 10px 26px rgba(200,130,150,.2), inset 0 1.5px 0 rgba(255,255,255,.95);}
.hdr{display:flex;align-items:center;justify-content:space-between;margin:6px 2px 14px;}
.hdr h1{font-size:30px;margin:0;color:var(--gold-dk);font-weight:700;}
.hdr .date{font-size:13px;color:var(--ink-soft);text-align:right;line-height:1.35;}
.hdr .greet{font-family:'Caveat',cursive;font-size:19px;color:var(--gold-dk);display:block;}
.pill{display:inline-block;border:none;border-radius:999px;padding:10px 18px;
  font-size:15px;font-weight:600;background:linear-gradient(180deg,#FFF3C4,#FBE193);color:var(--ink);
  box-shadow:0 4px 10px rgba(190,160,80,.3), 0 1px 2px rgba(190,160,80,.25),
    inset 0 1.5px 0 rgba(255,255,255,.8), inset 0 -3px 6px rgba(190,140,50,.18);
  cursor:pointer;transition:transform .08s,box-shadow .08s;}
.pill.gold{background:linear-gradient(180deg,#F9DC82,#E5AF3E);color:#5C4508;
  box-shadow:0 5px 14px rgba(201,150,40,.45), 0 1px 2px rgba(160,110,20,.3),
    inset 0 1.5px 0 rgba(255,255,255,.55), inset 0 -3px 7px rgba(150,100,15,.3);}
.pill.blushp{background:linear-gradient(180deg,#FBDDE4,#F0A9BB);color:#7A3B4E;
  box-shadow:0 5px 14px rgba(200,120,145,.4), inset 0 1.5px 0 rgba(255,255,255,.7), inset 0 -3px 7px rgba(170,80,105,.25);}
.pill.ghost{background:linear-gradient(180deg,#FFFFFF,#FBF6E4);border:1.5px solid var(--butter2);
  box-shadow:0 3px 8px rgba(190,160,80,.18), inset 0 1px 0 rgba(255,255,255,.9);}
.pill.sm{padding:6px 12px;font-size:13px;}
.pill:active{transform:translateY(2px) scale(.98);
  box-shadow:0 1px 3px rgba(190,160,80,.3), inset 0 2px 5px rgba(150,110,30,.25);}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.spread{display:flex;justify-content:space-between;align-items:center;}
.muted{color:var(--ink-soft);font-size:13px;}
.big{font-size:20px;font-weight:700;}
/* progress ring */
.ringwrap{display:flex;align-items:center;gap:16px;}
.ring{position:relative;width:92px;height:92px;flex:none;}
.ring svg{transform:rotate(-90deg);}
.ring .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:20px;color:var(--gold-dk);}
/* blocks */
.block{background:linear-gradient(170deg,#FFFFFF,#FFFDF2);border-radius:var(--r);box-shadow:var(--shadow);
  border:1px solid rgba(230,210,150,.5);
  margin-bottom:12px;overflow:hidden;}
.block .bhead{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;
  background:linear-gradient(180deg,#FFF9E2,var(--butter));cursor:pointer;
  box-shadow:inset 0 1.5px 0 rgba(255,255,255,.9), 0 2px 6px rgba(190,160,80,.15);}
.block.current .bhead{background:linear-gradient(135deg,#F7D774,#FFE99F);}
.block.done-block .bhead{background:linear-gradient(135deg,#E7F2E8,#F2F8F2);}
.block .bname{font-weight:700;font-size:15px;}
.block .btime{font-size:12.5px;color:var(--gold-dk);font-weight:800;
  background:rgba(255,255,255,.75);padding:3px 10px;border-radius:999px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.9), 0 1px 3px rgba(190,160,80,.2);white-space:nowrap;}
.block.prot .bhead{background:linear-gradient(135deg,var(--blush),#FDF0F3);}
.tasks{padding:4px 8px 8px;}
.task{display:flex;align-items:flex-start;gap:10px;padding:9px 8px;border-radius:12px;}
.task:active{background:var(--butter);}
.task .cb{flex:none;width:26px;height:26px;border-radius:9px;border:2px solid var(--gold);
  background:linear-gradient(180deg,#FFFFFF,#FBF3DC);display:flex;align-items:center;justify-content:center;
  font-size:16px;color:#fff;margin-top:1px;
  box-shadow:inset 0 2px 4px rgba(190,160,80,.2), 0 1px 0 rgba(255,255,255,.8);}
.task.done .cb{background:linear-gradient(180deg,#F7D774,#DFA835);border-color:#D9A521;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.5), 0 2px 5px rgba(190,140,40,.4);}
.task.done .tl{text-decoration:line-through;color:var(--ink-soft);}
.task .tl{font-size:15px;line-height:1.35;padding-top:2px;}
.task.crit .tl{font-weight:700;}
.task.crit .cb{border-color:var(--blush-dk);}
.task.crit.done .cb{background:var(--blush-dk);}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;
  background:var(--blush);color:#94465C;margin-left:6px;vertical-align:middle;}
.badge.gold{background:var(--butter2);color:var(--gold-dk);}
/* nav */
#nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,253,244,.97);
  backdrop-filter:blur(10px);border-top:1px solid #F0E6C8;display:flex;
  box-shadow:0 -6px 20px rgba(190,160,80,.22);
  padding:6px 6px calc(6px + env(safe-area-inset-bottom));z-index:50;}
#nav button{flex:1;background:none;border:none;font-size:11px;color:var(--ink-soft);
  padding:6px 2px;border-radius:14px;cursor:pointer;font-weight:600;transition:transform .1s;}
#nav button .ico{display:block;font-size:21px;margin-bottom:2px;}
#nav button.on{color:var(--gold-dk);background:linear-gradient(180deg,#FFF6D2,var(--butter2));
  box-shadow:0 3px 8px rgba(190,160,80,.3), inset 0 1px 0 rgba(255,255,255,.8);transform:translateY(-2px);}
.chip{box-shadow:0 2px 6px rgba(190,160,80,.15), inset 0 1px 0 rgba(255,255,255,.8);}
.chip.on{box-shadow:0 3px 8px rgba(190,140,40,.35), inset 0 1px 0 rgba(255,255,255,.4);}
/* modal */
#overlay{position:fixed;inset:0;background:rgba(74,63,42,.45);z-index:100;display:none;
  align-items:flex-end;justify-content:center;}
#overlay.show{display:flex;}
#modal{background:var(--bg);border-radius:24px 24px 0 0;width:100%;max-width:520px;
  max-height:86vh;overflow-y:auto;padding:20px 18px calc(24px + env(safe-area-inset-bottom));}
#modal h2{margin:0 0 4px;font-size:20px;color:var(--gold-dk);}
input[type=text],input[type=time],input[type=number],textarea,select{
  width:100%;padding:12px;border:1.5px solid var(--butter2);border-radius:14px;
  font-size:16px;background:#fff;color:var(--ink);font-family:inherit;margin:6px 0;}
textarea{min-height:80px;resize:vertical;}
/* verse cards */
.verse{font-family:'Caveat',cursive;line-height:1.4;font-size:22px;color:#6B5426;}
.vref{font-weight:700;font-size:13px;color:var(--gold-dk);margin-top:8px;font-style:normal;}
.blush .vref{color:var(--blush-dk);}
/* timer */
#timerbar{position:fixed;left:12px;right:12px;bottom:calc(80px + env(safe-area-inset-bottom));z-index:60;
  background:linear-gradient(180deg,#F9DC82,#E5AF3E);border-radius:999px;
  color:#5C4508;display:none;align-items:center;justify-content:space-between;
  padding:10px 18px;font-weight:700;
  box-shadow:0 8px 24px rgba(150,100,15,.4), inset 0 1.5px 0 rgba(255,255,255,.6);}
#timerbar.show{display:flex;}
/* confetti */
.cf{position:fixed;top:-12px;width:9px;height:14px;z-index:200;pointer-events:none;
  animation:fall linear forwards;border-radius:2px;}
@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:.9;}}
.chip{display:inline-block;padding:7px 14px;border-radius:999px;background:#fff;
  border:1.5px solid var(--butter2);font-size:13.5px;font-weight:600;margin:3px 4px 3px 0;cursor:pointer;}
.chip.on{background:var(--gold);color:#fff;border-color:var(--gold);}
.listitem{display:flex;align-items:center;gap:10px;padding:10px 6px;border-bottom:1px solid #F6EED4;}
.listitem:last-child{border-bottom:none;}
.listitem .grow{flex:1;}
.xbtn{background:none;border:none;color:var(--ink-soft);font-size:17px;padding:4px 8px;cursor:pointer;}
.duechip{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:999px;}
.due-over{background:#FBE3E3;color:#A94B4B;}
.due-today{background:var(--butter2);color:var(--gold-dk);}
.due-ok{background:#EAF4EB;color:var(--green-dk);}
.nudge{border:2px dashed var(--gold);background:var(--butter);}
.winline{padding:9px 4px;border-bottom:1px solid #F6EED4;font-size:14.5px;line-height:1.4;}
.winline .wd{font-size:11.5px;color:var(--ink-soft);font-weight:700;}
.tabbtns{display:flex;gap:8px;margin-bottom:12px;}
.tabbtns .pill{flex:1;text-align:center;}
.sec-title{font-family:'Caveat',cursive;font-size:23px;font-weight:700;
  color:#7A5E14;margin:18px 4px 6px;text-shadow:0 1px 0 rgba(255,255,255,.8);}
.fade{animation:fadein .3s ease;}
.mini{padding:10px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;
  font-weight:700;font-size:14.5px;border-radius:16px;cursor:pointer;}
.mini.mdone{opacity:.6;}
.mini .btime{font-weight:600;}
details.sect{margin-bottom:10px;}
details.sect summary{cursor:pointer;list-style-position:outside;}
details.sect summary .sec-title{display:inline;margin:0;}
.nextline{border:1.5px dashed var(--gold);background:rgba(255,243,196,.5);}
.ckb{width:34px;height:34px;border-radius:50%;border:2.5px solid var(--gold);background:transparent;
  color:transparent;font-size:17px;font-weight:800;flex:none;cursor:pointer;
  transition:all .18s ease;box-shadow:inset 0 2px 4px rgba(190,160,80,.15);}
.ckb.on{background:linear-gradient(180deg,#F7D774,#DFA835);color:#fff;transform:scale(1.12);
  box-shadow:0 3px 8px rgba(190,140,40,.45);}
.znz{background:none;border:none;font-size:16px;color:var(--ink-soft);cursor:pointer;padding:4px;}
.gcat{font-size:11.5px;font-weight:800;color:#A0812E;text-transform:uppercase;letter-spacing:.07em;margin:12px 2px 2px;}
.cnt{font-family:'Nunito',sans-serif;font-size:12.5px;font-weight:800;background:#fff;color:#8A6A1F;
  border-radius:999px;padding:2px 9px;vertical-align:3px;margin-left:5px;
  box-shadow:0 1px 3px rgba(190,160,80,.3), inset 0 1px 0 rgba(255,255,255,.9);}
.addwin{float:right;margin-top:-2px;}
@keyframes flick{0%,100%{transform:scale(1) rotate(-4deg);}50%{transform:scale(1.22) rotate(5deg);}}
.flame{display:inline-block;}
.flame.on{animation:flick 1.1s ease-in-out infinite;}
.flame.off{filter:grayscale(1);opacity:.5;}
@keyframes hexpulse{0%,100%{stroke-opacity:1;}50%{stroke-opacity:.25;}}
.hexToday{animation:hexpulse 1.7s ease-in-out infinite;}
#savedot{position:fixed;top:calc(10px + env(safe-area-inset-top));right:12px;z-index:90;
  background:rgba(91,140,95,.93);color:#fff;font-size:12px;font-weight:800;
  padding:4px 11px;border-radius:999px;opacity:0;transition:opacity .3s;pointer-events:none;}
#savedot.show{opacity:1;}
label.muted{display:block;margin:10px 0 2px;}
input[type=date],input[type=time]{display:block;width:100%;}
.task .tl{transition:color .25s,opacity .25s;}
.block.current{border-left:6px solid var(--gold);
  box-shadow:0 0 0 3px rgba(247,215,116,.4), 0 1px 2px rgba(190,160,80,.12), 0 12px 30px rgba(190,160,80,.28), inset 0 1.5px 0 rgba(255,255,255,.95);}
.esel{box-shadow:0 0 0 3px rgba(217,138,156,.55), 0 4px 10px rgba(200,120,145,.4) !important;transform:scale(1.1);}
@keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.center{text-align:center;}
.heart{color:var(--blush-dk);}
</style>
</head>
<body>
<div id="timerbar">
  <span id="timerphase">Focus</span>
  <span id="timerclock" class="serif" style="font-size:20px;">50:00</span>
  <span>
    <button class="pill sm" id="timerpause" onclick="timerToggle()">Pause</button>
    <button class="pill sm" onclick="timerStop()">End</button>
  </span>
</div>
<div id="app"></div>
<nav id="nav">
  <button data-v="today" class="on"><span class="ico">☀️</span>Today</button>
  <button data-v="chores"><span class="ico">🫧</span>Chores</button>
  <button data-v="lists"><span class="ico">🛒</span>Lists</button>
  <button data-v="wins"><span class="ico">💛</span>Wins</button>
  <button data-v="edit"><span class="ico">⚙️</span>Edit</button>
</nav>
<div id="overlay" onclick="if(event.target===this)closeModal()"><div id="modal"></div></div>
<script>
"use strict";
/* ================= DATA ================= */
const MORNING_MIN = [
  {n:"Rise & shine",s:"05:00",e:"05:10",tasks:[{id:"wake",t:"Wake up · brush teeth · bathroom"}]},
  {n:"Workout",s:"05:10",e:"05:35",workout:true,tasks:[{id:"workout",t:"Today's workout (tap the card below ⤵)"}]},
  {n:"Shower & reset",s:"05:35",e:"05:55",tasks:[{id:"shower",t:"Shower and reset"}]},
  {n:"Next-day prep",s:"05:55",e:"06:05",tasks:[{id:"prep",t:"Lay out clothes, jewelry, workout clothes"}]},
  {n:"Makeup & hair",s:"06:05",e:"06:25",tasks:[{id:"glam",t:"Makeup and hair"}]},
  {n:"Daily prep",s:"06:25",e:"07:00",bible:true,tasks:[
    {id:"bible",t:"Bible time (10 min) — today's verse below"},
    {id:"tidy",t:"15-minute tidy"},
    {id:"office",t:"Office setup — computer, notes (10 min)"}]}
];
function eveningStd(){ // Mon/Tue evening (4:30 wind down)
  return [
    {n:"Wind down",s:"16:30",e:"17:00",win:"work",tasks:[{id:"wind",t:"Close the workday — then log one win 🏆"}]},
    {n:"Protected time",s:"17:00",e:"18:00",prot:true,tasks:[{id:"dinner",t:"Dinner prep · read · a show — NO PHONES 🚫📱"}]},
    {n:"Night reset",s:"18:00",e:"18:30",tasks:[{id:"skincare",t:"Makeup removal · brush teeth"}]},
    {n:"My time",s:"18:30",e:"21:00",couple:true,tasks:[{id:"mytime",t:"Your time — verse & couple win below 💛"}]}
  ];
}
function eveningLate(){ // Wed/Thu/Fri evening (shifted 30-60 min)
  return [
    {n:"Wind down",s:"16:30",e:"17:30",win:"work",tasks:[{id:"wind",t:"Close the workday — then log one win 🏆"}]},
    {n:"Protected time",s:"17:30",e:"18:30",prot:true,tasks:[{id:"dinner",t:"Dinner prep · read · a show — NO PHONES 🚫📱"}]},
    {n:"Night reset",s:"18:30",e:"19:00",tasks:[{id:"skincare",t:"Makeup removal · brush teeth"}]},
    {n:"My time",s:"19:00",e:"21:00",couple:true,tasks:[{id:"mytime",t:"Your time — verse & couple win below 💛"}]}
  ];
}
const DEFAULT_ROUTINES = {
  1:[...MORNING_MIN,
    {n:"Work · Block 1",s:"07:00",e:"12:00",tasks:[
      {id:"m-sched",t:"Schedule review (this week + next) · notes of concerns · breakfast & coffee ☕ (7–8)"},
      {id:"m-invoice",t:"Private Care invoicing (8–9:30)"},
      {id:"m-admin",t:"Bookkeeping & admin cleanup (9:30–12) — use the 50/10 timer ⏱",timer:true}]},
    {n:"Lunch & walk",s:"12:00",e:"12:45",tasks:[{id:"lunch",t:"Lunch and a walk 🚶‍♀️"}]},
    {n:"Work · Block 2",s:"12:45",e:"15:00",tasks:[{id:"m-team",t:"Assist team + additional admin work"}]},
    {n:"Close out",s:"15:00",e:"16:30",tasks:[{id:"m-emails",t:"Final emails · end-of-day review"}]},
    ...eveningStd()],
  2:[...MORNING_MIN,
    {n:"Work · Block 1",s:"07:00",e:"12:00",tasks:[
      {id:"t-sched",t:"Schedule review (this week + next) · notes of concerns · breakfast & coffee ☕ (7–8)"},
      {id:"t-payroll",t:"Payroll + new employee entry (8–12)",timer:true}]},
    {n:"Lunch & walk",s:"12:00",e:"12:45",tasks:[{id:"lunch",t:"Lunch and a walk 🚶‍♀️"}]},
    {n:"Work · Block 2",s:"12:45",e:"15:00",tasks:[{id:"t-team",t:"Assist team + additional admin work"}]},
    {n:"Close out",s:"15:00",e:"16:30",tasks:[{id:"t-emails",t:"Final emails · end-of-day review"}]},
    ...eveningStd()],
  3:[...MORNING_MIN,
    {n:"Work · Block 1",s:"07:00",e:"12:00",tasks:[
      {id:"w-tutor-email",t:"Email tutoring link — FIRST THING",crit:true},
      {id:"w-sched",t:"Schedule review + notes · breakfast & coffee ☕ (7:05–8)"},
      {id:"w-push",t:"Payroll push / weekly set (8–9)"},
      {id:"w-admin",t:"Admin · bookkeeping · open to helping (9–12)",timer:true}]},
    {n:"Lunch & walk",s:"12:00",e:"12:45",tasks:[{id:"lunch",t:"Lunch and a walk 🚶‍♀️"}]},
    {n:"Work · Block 2",s:"12:45",e:"15:00",tasks:[{id:"w-team",t:"Assist team + additional admin work"}]},
    {n:"Tutoring",s:"15:00",e:"16:00",tasks:[{id:"w-tutor",t:"Tutoring session 📚",crit:true}]},
    {n:"Close out",s:"16:00",e:"16:30",tasks:[{id:"w-emails",t:"Final emails · end-of-day review"}]},
    ...eveningLate()],
  4:[...MORNING_MIN,
    {n:"Open block",s:"07:00",e:"12:00",open:true,tasks:[
      {id:"th-avail",t:"Stay available for work calls 📞"},
      {id:"th-chores",t:"Light house tasks between calls — tap “Fill my time” ⤵"},
      {id:"th-shop",t:"Grocery shop 🛒 (list is ready in Lists)"}]},
    {n:"Lunch & walk",s:"12:00",e:"12:45",tasks:[{id:"lunch",t:"Lunch and a walk 🚶‍♀️"}]},
    {n:"Work · Block 2",s:"12:45",e:"16:00",tasks:[{id:"th-team",t:"Assist team + additional admin work"}]},
    {n:"Close out",s:"16:00",e:"16:30",tasks:[{id:"th-emails",t:"Final emails · end-of-day review"}]},
    ...eveningLate()],
  5:[...MORNING_MIN,
    {n:"Open block",s:"07:00",e:"12:00",open:true,meeting:true,tasks:[
      {id:"f-avail",t:"Stay available for work calls 📞"},

function todayKey(d){ d=d||new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function keyToDate(k){ const p=k.split("-"); return new Date(+p[0],+p[1]-1,+p[2]); }

function doy(d){ d=d||new Date(); return Math.floor((d-new Date(d.getFullYear(),0,0))/864e5); }

/* ---- chores due logic ---- */
function daysSince(k){ if(!k) return 999; return Math.round((keyToDate(todayKey())-keyToDate(k))/864e5); }
function choreDue(c){ // returns days overdue (0 = due today, negative = not yet due)
  const ds=c.last?daysSince(c.last):(c.type==="freq"?c.every:999); // never done = due today, not overdue-forever
  if(c.type==="freq") return ds-c.every;
  if(c.type==="day"){ // due on its fixed day if not done in last 6 days
    if(dow()===c.day && ds>0) return 0;
    return -1;
  }
  return -1;
}
function dueChores(interruptibleOnly){

/* ---- streak ---- */
function dayPct(k){
  const L=S.log[k]; if(!L) return 0;
  const d=dow(keyToDate(k));
  let total=0,done=0;
  if(d===0||d===6){
    const sc=L.sched||[];
    total+=sc.length; done+=sc.filter(x=>x.done).length;
    (S.routines[d]||[]).forEach(b=>b.tasks.forEach(t=>{total++; if(L.c[t.id])done++;}));
    if(!total) return L.dDone?100:0;
  }else{
    (S.routines[d]||[]).forEach(b=>b.tasks.forEach(t=>{total++; if(L.c[t.id])done++;}));
  }
  (L.extra||[]).forEach(x=>{total++; if(x.done)done++;});
  return total?Math.round(done/total*100):0;
}
function dayComplete(k){ return dayPct(k)>=70; }
function streak(){
  let s=0, d=new Date(), graceByWeek={};
  if(dayComplete(todayKey(d))) s++;
  d.setDate(d.getDate()-1);
  for(let i=0;i<730;i++){
    const k=todayKey(d);
    if(dayComplete(k)){ s++; }
    else{
      const w=isoWeek(d);
      if(!graceByWeek[w] && S.log[k]!==undefined||!graceByWeek[w]){ // one grace day per week
        if(graceByWeek[w]) break;
        graceByWeek[w]=true;
        if(s===0 && i===0){ /* yesterday missed, grace it */ }
      } else break;
      if(graceByWeek[w]===true && dayComplete(k)===false){
        // grace consumed, don't increment
        if(Object.keys(graceByWeek).length>0 && !graceByWeek[w+"_used"]) graceByWeek[w+"_used"]=true;
        else break;
      }
    }
    d.setDate(d.getDate()-1);
    // stop if two consecutive misses
    if(!dayComplete(k)){
      const k2=todayKey(d);
      if(!dayComplete(k2)) break;
    }
  }
  return s;
}

let AC=null;
function chime(kind){
  try{
    AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    const notes = kind==="break" ? [523,659,784] : kind==="back" ? [784,659,523] : [659,784];
    notes.forEach((f,i)=>{
      const o=AC.createOscillator(),g=AC.createGain();
      o.type="sine"; o.frequency.value=f; o.connect(g); g.connect(AC.destination);
      const t=AC.currentTime+i*.22;
      g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(.25,t+.03);
      g.gain.exponentialRampToValueAtTime(.001,t+.5);
      o.start(t); o.stop(t+.55);
    });
  }catch(e){}
}

/* ---- weekend "I'm up" ---- */
function imUp(){
  const L=dayLog();
  const start=nowMin()+30; // 30 min to wake up gently
  const items=[];
  items.push({t:"Slow morning — coffee, breakfast, breathe ☕",choreId:null});
  const due=dueChores(false).slice(0,4);
  due.forEach(c=>items.push({t:c.n+" ("+c.eff+" min)",choreId:c.id,eff:c.eff}));
  // deep clean of the week (Saturdays, or Sunday if not done)
  const wk=isoWeek(new Date());
  if(S.deepLastWeek!==wk){
    items.push({t:"Deep task: "+DEEP_CLEAN[S.deepIdx%DEEP_CLEAN.length]+" 🌟",choreId:"DEEP"});
  }
  // leftover unchecked from the week (carried forward)
  const carry=carriedForward().slice(0,2);
  carry.forEach(t=>items.push({t:"Carried over: "+t,choreId:null}));
  items.push({t:"Reward break — do something just for you 💛",choreId:null});
  let t=start;
  L.sched=items.map(it=>{
    const dur=it.eff||30;
    const o={time:fmtMin(t),t:it.t,choreId:it.choreId,done:false};
    t+=dur+10;
    return o;
  });
  L.sched.push({time:fmtMin(t),t:"Rest guilt-free — the list is done when it's done 🌸",choreId:null,done:false});
  save(); confetti(30); toast("Good morning, sunshine! Your day is planned. ☀️"); render();
}
function carriedForward(){
  // unchecked tasks from the last 5 weekdays
  const out=[]; const d=new Date();
  for(let i=1;i<=5;i++){
    d.setDate(d.getDate()-1);
    const wd=dow(d); if(wd===0||wd===6) continue;
    const k=todayKey(d); const L=S.log[k]; if(!L) continue;
    (S.routines[wd]||[]).forEach(b=>b.tasks.forEach(t=>{
      if(!L.c[t.id] && !/wake|shower|makeup|lunch|dinner|teeth|my time|available/i.test(t.t) && out.length<6)
        out.push(t.t.replace(/\s*[·—-]\s*use the.*$/i,"").slice(0,60));
    }));
  }
  return out;
}

/* ---------- WEEKEND ---------- */
function vWeekend(L){
  let h="";
  const d=dow();
  if(!L.sched||!L.sched.length){
    h+=`<div class="card soft center" style="padding:30px 20px;">
      <div style="font-size:44px;">🌞</div>
      <h2 class="serif" style="margin:8px 0 4px;color:var(--gold-dk);">It's ${DAYN[d]} — no work today!</h2>
      <p class="muted">Tap the button when you're up and I'll build your day from that exact moment — catch-up tasks, one deep task, and rest.</p>
      <button class="pill gold" style="font-size:18px;padding:14px 34px;" onclick="imUp()">☀️ I'm up!</button></div>`;
  }else{
    h+=`<div class="sec-title">☀️ Your ${DAYN[d]} plan</div>`;
    L.sched.forEach((x,i)=>{
      h+=`<div class="card spread ${x.done?"":""}" style="padding:12px 16px;">
        <div class="task ${x.done?"done":""}" style="padding:0;flex:1;" onclick="toggleSched(${i})">
          <div class="cb">${x.done?"✓":""}</div>
          <div class="tl"><b>${x.time}</b> · ${esc(x.t)}</div></div></div>`;
    });
    h+=`<div class="row" style="margin:4px 2px 14px;">
      <button class="pill ghost sm" onclick="askConfirm('Rebuild the plan from right now?',()=>{dayLog().sched=[];save();imUp();})">🔄 Replan from now</button>
      <button class="pill ghost sm" onclick="markDeepDone()">✓ Deep task done</button></div>`;
  }
  // optional custom weekend routine blocks
  const wblocks=S.routines[d]||[];
  if(wblocks.length){
    h+=`<div class="sec-title">📝 Your ${DAYN[d]} routine</div>`;
    const now=nowMin();
    wblocks.forEach((b,bi)=>{ const cur=now>=tMin(b.s)&&now<tMin(b.e); h+=blockCard(b,bi,L,cur); });
  }
  if(d===0) h+=sundayPreview();
  h+=coupleCard();
  return h;
}

}
function sundayPreview(){

  const first=mon.slice(0,3).map(b=>`<span class="muted">• ${fmtT(b.s)} — ${esc(b.n)}</span>`).join("<br>");

/* ---------- CHORES ---------- */
function vChores(){
  let h=header();
  h+=`<div class="tabbtns"><button class="pill gold" onclick="openFill()">✨ Fill my time</button>
  <button class="pill ghost" onclick="editChore(null)">+ Add chore</button></div>`;
  h+=`<div class="sec-title">🌟 This weekend's deep task</div>
  <div class="card soft spread"><div><b>${esc(DEEP_CLEAN[S.deepIdx%DEEP_CLEAN.length])}</b><br>
  <span class="muted">${S.deepLastWeek===isoWeek(new Date())?"Done this week — next one queued! ✓":"One per weekend keeps panic-cleaning away"}</span></div>
  ${S.deepLastWeek===isoWeek(new Date())?"":`<button class="pill sm gold" onclick="markDeepDone()">Done ✓</button>`}</div>`;
  const rowFor=c=>{
    const od=choreDue(c);
    const sub=c.last?`${choreDueText(c)} · ~${c.eff} min · last ${c.last.slice(5).replace("-","/")}`
      :`✨ New · ~${c.eff} min`;
    return `<div class="listitem">
      <button class="ckb" onclick="checkChore(this,'${c.id}')"></button>
      <div class="grow" onclick="editChore('${c.id}')"><b>${esc(c.n)}</b><br><span class="muted">${sub}</span></div>
      ${od>=0?`<button class="znz" title="Snooze" onclick="snoozeChore('${c.id}')">💤</button>`:""}</div>`;
  };
  const match=c=>choreFilter===null?true:choreFilter===5?c.eff<=5:choreFilter===15?c.eff<=15:c.eff>=30;
  h+=`<div style="margin:0 2px 4px;">
    <span class="chip ${choreFilter===null?"on":""}" onclick="choreFilter=null;choreShowAll=false;render()">All (${S.chores.length})</span>
    <span class="chip ${choreFilter===5?"on":""}" onclick="choreFilter=5;choreShowAll=false;render()">⚡ 5-min wins</span>
    <span class="chip ${choreFilter===15?"on":""}" onclick="choreFilter=15;choreShowAll=false;render()">⏱ 15 min</span>
    <span class="chip ${choreFilter===30?"on":""}" onclick="choreFilter=30;choreShowAll=false;render()">🧹 Deep cleans</span>
  </div>`;
  const F=S.chores.filter(match);
  const dueNow=F.filter(c=>choreDue(c)>=0).sort((a,b)=>choreDue(b)-choreDue(a));
  const weekly=F.filter(c=>choreDue(c)<0&&(c.type==="day"||c.every<28))
    .sort((a,b)=>choreDue(b)-choreDue(a));
  const monthly=F.filter(c=>choreDue(c)<0&&c.type==="freq"&&c.every>=28)
    .sort((a,b)=>choreDue(b)-choreDue(a));
  const shown=choreShowAll?dueNow:dueNow.slice(0,5);
  h+=`<div class="sec-title">🔥 Needs doing now<span class="cnt">${dueNow.length}</span></div><div class="card">`;
  h+=shown.length?shown.map(rowFor).join(""):`<p class="muted center">Nothing due — the house is caught up! 🎉</p>`;
  if(dueNow.length>5) h+=`<div class="center" style="padding:6px 0 2px;">
    <button class="pill ghost sm" onclick="choreShowAll=${!choreShowAll};render()">${choreShowAll?"Show less ☝":"Show "+(dueNow.length-5)+" more 👇"}</button></div>`;
  h+=`</div><details class="sect" ${sAttr("c-week")}><summary><span class="sec-title">🫧 Daily & weekly</span><span class="cnt">${weekly.length}</span></summary><div class="card">`;
  h+=weekly.length?weekly.map(rowFor).join(""):`<p class="muted center">All caught up here! ✨</p>`;
  h+=`</div></details><details class="sect" ${sAttr("c-mon")}><summary><span class="sec-title">🏠 Monthly house-keepers</span><span class="cnt">${monthly.length}</span></summary><div class="card">`;
  h+=monthly.length?monthly.map(rowFor).join(""):`<p class="muted center">You're all caught up for the month! ✨</p>`;
  h+=`</div></details><p class="muted center" style="padding:0 20px;">Tap a chore's name to edit it · 💤 snoozes it guilt-free.</p>`;
  return h;
}

function saveChore(id){
  const n=$("#ch-n").value.trim(); if(!n){toast("Give it a name 💛");return;}
  const o={n,eff:+$("#ch-eff").value,type:$("#ch-type").value,every:+$("#ch-every").value,
    day:+$("#ch-day").value,intr:$("#ch-intr").checked};
  if(id){ Object.assign(S.chores.find(x=>x.id===id),o); }
  else{ S.chores.push({id:"c"+Date.now(),last:null,...o}); }
  save(); closeModal(); render();
}
/* ---------- LISTS ---------- */
function gCat(n){
  const s=n.toLowerCase();
  const has=w=>w.some(x=>s.includes(x));
  if(has(["apple","banana","berr","grape","orange","lemon","lime","melon","avocado","lettuce","spinach","salad","tomato","onion","garlic","pepper","carrot","celery","broccoli","cucumber","potato","fruit","veget","zucchini","squash","corn","mushroom","cilantro","herb","peach"])) return "🥦 Produce";
  if(has(["chicken","beef","pork","turkey","ham","bacon","sausage","steak","fish","salmon","shrimp","tuna","meat"])) return "🍗 Meat & seafood";
  if(has(["milk","cheese","yogurt","butter","cream","egg"])) return "🥛 Dairy & eggs";
  if(has(["frozen","ice cream","pizza"])) return "🧊 Frozen";
  if(has(["paper","towel","soap","detergent","cleaner","trash bag","foil","shampoo","toothpaste","sponge"])) return "🧻 Household";
  return "🥫 Pantry & more";
}

function saveMeal(i){
  const n=(S.dinners[i]||"").trim(); if(!n){toast("Type the dinner in first 💛");return;}

  askText("⭐ Ingredients for "+esc(n),"comma separated — saved for one-tap reuse","",v=>{
    S.meals.push({n,ing:v?v.split(",").map(x=>x.trim()).filter(Boolean):[]});
    save(); confetti(14); toast("Saved to favorites ⭐"); render(); });
}
function useMeal(mi){
  const m=S.meals[mi];
  openModal(`<h2>🍽 ${esc(m.n)} — which night?</h2>
  <div style="margin-top:8px;">${[0,1,2,3,4,5,6].map(i=>`<span class="chip" onclick="useMealDay(${mi},${i})">${DAYN[(i+1)%7]}</span>`).join("")}</div>

}
function useMealDay(mi,i){
  const m=S.meals[mi];

  (m.ing||[]).forEach(n=>{ if(!S.groceries.find(g=>g.n.toLowerCase()===n.toLowerCase()&&!g.ck)) S.groceries.push({n,ck:false,src:m.n}); });
  save(); closeModal(); toast("Planned + ingredients added 🛒"); render();
}
function addG(){ const v=$("#g-new").value.trim(); if(v){S.groceries.push({n:v,ck:false});save();render();

/* ---------- HONEYCOMB ---------- */
function hexInfo(k,p){
  const dt=keyToDate(k).toLocaleDateString(undefined,{weekday:"short",month:"long",day:"numeric"});
  toast(p>=100?dt+" · Perfect day — honey + a bee! 🐝":p>=70?dt+" · Honey earned! 🍯":p>0?dt+" · "+p+"% — a 🌱 kind of day":dt+" · Empty cell — and that's okay 💛");
}
function hexPts(cx,cy,R){
  let p=[];
  for(let i=0;i<6;i++){ const a=(Math.PI/180)*(60*i-30);
    p.push((cx+R*Math.cos(a)).toFixed(1)+","+(cy+R*Math.sin(a)).toFixed(1)); }
  return p.join(" ");
}
function honeycombCard(){
  const days=[]; const d=new Date(); d.setDate(d.getDate()-29);
  for(let i=0;i<30;i++){ const k=todayKey(d), p=S.log[k]?dayPct(k):0;
    days.push({k,p}); d.setDate(d.getDate()+1); }
  let cells="", honey=0, bees=0;
  const R=23, DX=Math.sqrt(3)*R, DY=1.5*R; // true tessellation spacing
  days.forEach((dd,i)=>{
    const c=i%6, r=Math.floor(i/6);
    const cx=32+c*DX+(r%2?DX/2:0), cy=32+r*DY;
    const isToday=i===29;
    let inner="";
    if(dd.p>=70){ // liquid honey: radial fill + gloss + amber glow
      const grad=dd.p>=100?"url(#honeyPerfect)":"url(#honeyR)";
      inner=`<polygon points="${hexPts(cx,cy,R-1.5)}" fill="${grad}" stroke="#C9971F" stroke-width="1.2" filter="url(#hexGlow)" style="pointer-events:none;"/>
      <ellipse cx="${cx-5}" cy="${cy-8}" rx="7.5" ry="4" fill="rgba(255,255,255,.55)" transform="rotate(-18 ${cx-5} ${cy-8})" style="pointer-events:none;"/>`;
      honey++;
      if(dd.p>=100){ bees++;
        inner+=`<text x="${cx}" y="${cy+6}" font-size="15" text-anchor="middle" style="pointer-events:none;">🐝
          <animate attributeName="y" values="${cy+6};${cy+3};${cy+6}" dur="1.8s" repeatCount="indefinite"/></text>`; }
    } else if(dd.p>0){ // a little honey pooling at the bottom of the wax pocket
      inner=`<polygon points="${hexPts(cx,cy,R-3)}" fill="url(#waxIn)" style="pointer-events:none;"/>
      <path d="M ${cx-11} ${cy+6} Q ${cx} ${cy+2} ${cx+11} ${cy+6} L ${cx+7} ${cy+13} Q ${cx} ${cy+16.5} ${cx-7} ${cy+13} Z" fill="url(#honeyR)" opacity=".8" style="pointer-events:none;"/>`;
    } else { // recessed empty beeswax pocket
      inner=`<polygon points="${hexPts(cx,cy,R-3)}" fill="url(#waxIn)" style="pointer-events:none;"/>`;
    }
    cells+=`<polygon points="${hexPts(cx,cy,R)}" fill="url(#waxWall)" stroke="#E5C17C" stroke-width="1.4" onclick="hexInfo('${dd.k}',${dd.p})" style="cursor:pointer;"><title>${dd.k} — ${dd.p}%</title></polygon>
    ${inner}
    ${isToday?`<polygon class="hexToday" points="${hexPts(cx,cy,R+2)}" fill="none" stroke="#E9973B" stroke-width="3" style="pointer-events:none;"/>
      <text x="${cx}" y="${cy-R-5}" font-size="9" font-weight="800" fill="#A0812E" text-anchor="middle" style="pointer-events:none;font-family:Nunito,sans-serif;">TODAY</text>`:""}`;
  });
  const pctFull=Math.round(honey/30*100);
  return `<div class="card soft"><b>🍯 Your honeycomb</b> <span class="muted">(last 30 days)</span>
  <div style="text-align:center;margin-top:4px;">
  <svg viewBox="0 0 292 200" style="max-width:320px;width:100%;">
    <defs>
      <radialGradient id="honeyR" cx="35%" cy="35%" r="75%"><stop offset="0" stop-color="#FFD05B"/><stop offset="1" stop-color="#D88B11"/></radialGradient>
      <radialGradient id="honeyPerfect" cx="35%" cy="35%" r="75%"><stop offset="0" stop-color="#FFE07A"/><stop offset="1" stop-color="#D07F0A"/></radialGradient>
      <linearGradient id="waxWall" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3D9A2"/><stop offset="1" stop-color="#E2B96E"/></linearGradient>
      <linearGradient id="waxIn" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E9D2A0"/><stop offset=".35" stop-color="#FFFDF5"/><stop offset="1" stop-color="#FBF3DE"/></linearGradient>
      <filter id="hexGlow" x="-40%" y="-40%" width="180%" height="180%">
        <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#E68C14" flood-opacity="0.45"/>
      </filter>
    </defs>${cells}</svg></div>
  <div class="spread" style="margin-top:4px;">
    <span class="muted">🍯 <b>${honey}</b>/30 cells filled (${pctFull}%)</span>
    <span class="muted">🐝 <b>${bees}</b> perfect-day bee${bees===1?"":"s"}</span>
  </div>
  <span class="muted">Every complete day drips honey into a cell. Perfect days earn a bee. Fill the hive, ${esc(S.settings.name)}. 👑</span></div>`;
}
/* ---------- ME MOMENT ---------- */
function meMoment(){
  const bank=ME_MOMENTS.concat(S.myMoments||[]);
  const idea=bank[Math.floor(Math.random()*bank.length)];
  openModal(`<h2>🌼 Me moment</h2>
  <p class="muted">Rest isn't earned, it's part of the plan. Pick one:</p>
  <div class="card blush" style="margin-top:8px;"><p style="font-size:17px;line-height:1.5;margin:4px 0;text-align:center;">${esc(idea)}</p></div>
  <div class="row">
    <button class="pill blushp" onclick="acceptMoment(${JSON.stringify(idea).replace(/"/g,"&quot;")})">Doing it 💛</button>
    <button class="pill ghost" onclick="meMoment()">Another</button>
    <button class="pill ghost sm" onclick="askText('🌼 Add your own me-moment','e.g. Porch swing time','',v=>{if(v&&v.trim()){S.myMoments.push(v.trim());save();toast('Added to your bank 🌼');}meMoment();})">+ my own</button>
  </div>
  <button class="pill ghost sm" style="margin-top:8px;" onclick="closeModal()">Close</button>`);
}
function acceptMoment(txt){
  const L=dayLog();
  L.extra.push({t:"🌼 Me moment: "+txt,choreId:null,done:false});
  save(); closeModal(); toast("Enjoy every minute of it. 💛"); render();
}
/* ---------- chore due text ---------- */
function choreDueText(c){
  if(c.type==="day"){ return "Every "+DAYN[c.day]; }
  if(!c.last) return "Ready for its first ✓";
  const od=choreDue(c);
  if(od>14) return "Overdue — no shame, just start";
  if(od===1) return "Due yesterday";
  if(od>0) return "Overdue by "+od+" days";
  if(od===0) return "Due today";
  return "Due in "+(-od)+" day"+(od<-1?"s":"");
}
function checkChore(btn,id){
  btn.classList.add("on"); btn.textContent="✓";
  setTimeout(()=>{ doneChore(id); confetti(16); cheer(); render(); },220);
}
function snoozeChore(id){
  const c=S.chores.find(x=>x.id===id); if(!c) return;
  if(c.type==="freq"){ const dd=new Date(); dd.setDate(dd.getDate()-(c.every-1)); c.last=todayKey(dd); }
  else c.last=todayKey();
  save(); toast("Snoozed — it'll come back around. No guilt. 💛"); render();
}
/* ---------- EDIT / SETTINGS ---------- */
let editDay=1, choreFilter=null, choreShowAll=false;
function vEdit(){
  let h=header();
  h+=`<div class="sec-title">📝 Edit my routines</div>
  <div class="card"><div>${[1,2,3,4,5,6,0].map(d=>`<span class="chip ${editDay===d?"on":""}" onclick="editDay=${d};render()">${DAYS[d]}</span>`).join("")}</div>
  ${(editDay===0||editDay===6)?`<p class="muted" style="margin:8px 0 0;">Weekend blocks are optional — they show on your ${DAYN[editDay]} alongside the "I'm up" plan.</p>`:""}
  <div style="margin-top:10px;">`;
  (S.routines[editDay]||[]).forEach((b,bi)=>{
    const flags=[b.workout?"💪":"",b.bible?"📖":"",b.prot?"🚫":""].filter(Boolean).join(" ");
    h+=`<div style="border:1.5px solid var(--butter2);border-radius:14px;padding:10px;margin-bottom:10px;">
      <div class="spread"><b>${esc(b.n)} ${flags}</b><span class="row" style="gap:4px;flex-wrap:nowrap;"><span class="muted">${fmtT(b.s)}–${fmtT(b.e)}</span>
        <button class="znz" title="Delete block" onclick="askConfirm('Delete this whole block?',()=>{S.routines[editDay].splice(${bi},1);save();render();})">🗑</button></span></div>
      <div class="muted" style="font-size:13.5px;line-height:1.55;margin:4px 0 8px;">${b.tasks.map(t=>"• "+esc(t.t)).join("<br>")||"<i>No tasks yet</i>"}</div>
      <button class="pill sm gold" onclick="editBlock(${bi})">✎ Edit block</button></div>`;
  });
  h+=`<div class="row" style="margin-top:4px;">
    <button class="pill ghost" onclick="editBlock(null)">+ Add a block to ${DAYN[editDay]}</button>
    ${editDay===1?`<button class="pill ghost sm" onclick="askConfirm('Copy Monday to Tue-Fri? Their current blocks will be replaced.',copyMonToWeek)">📋 Copy Mon → Tue–Fri</button>`:""}
  </div>
  <p class="muted" style="margin:8px 0 0;">✎ edits everything about a block on one screen · 🗑 deletes it.</p></div>`;
  h+=`<div class="sec-title">⚙️ Settings</div><div class="card">
    <label class="muted">Your name</label><input type="text" value="${esc(S.settings.name)}" onchange="S.settings.name=this.value;save();">
    <label class="muted">Partner's name</label><input type="text" value="${esc(S.settings.partner)}" onchange="S.settings.partner=this.value;save();">
    <label class="muted">App name</label><input type="text" value="${esc(S.settings.appName)}" onchange="S.settings.appName=this.value;save();render();">
    <label class="muted">Check-in nudge times</label>
    <div class="row"><input type="time" style="flex:1;" value="${S.settings.checkins[0]}" onchange="S.settings.checkins[0]=this.value;save();">
    <input type="time" style="flex:1;" value="${S.settings.checkins[1]}" onchange="S.settings.checkins[1]=this.value;save();"></div>
    <label class="muted">Grocery shop day</label>
    <select onchange="S.settings.shopDay=+this.value;save();render();">${DAYN.map((d,i)=>`<option value="${i}"${S.settings.shopDay===i?" selected":""}>${d}</option>`).join("")}</select>
    <label class="muted">💍 Anniversary</label><input type="date" value="${S.myDates.anniv||""}" onchange="S.myDates.anniv=this.value;save();">
    <label class="muted">🎂 Your birthday</label><input type="date" value="${S.myDates.bday||""}" onchange="S.myDates.bday=this.value;save();">
    <label class="muted">🎂 ${esc(S.settings.partner)}'s birthday</label><input type="date" value="${S.myDates.pbday||""}" onchange="S.myDates.pbday=this.value;save();">
  </div>`;
  h+=`<div class="card soft"><b>⏰ Set these iPhone alarms once</b>
    <p class="muted" style="margin:6px 0 0;line-height:1.6;">The app can't ring when it's closed, so let your phone handle the wake-ups:<br>
    • <b>5:00 AM</b> weekdays — rise & shine<br>
    • <b>7:00 AM</b> Wednesdays — tutoring link email 📚<br>
    • Optional: <b>12:30 & 3:30 PM</b> — check-in nudges</p>
    <button class="pill ghost sm" style="margin-top:8px;" onclick="copyAlarms()">📋 Copy schedule text</button></div>`;
  h+=`<div class="card">
    <b>💾 Backup</b>
    <p class="muted" style="margin:4px 0 8px;">Your data lives only on this phone. Export a backup now and then.</p>
    <div class="row">
      <button class="pill gold sm" onclick="exportData()">Export backup</button>
      <label class="pill ghost sm" style="cursor:pointer;">Restore<input type="file" accept=".json" style="display:none;" onchange="importData(this)"></label>
      <button class="pill ghost sm" onclick="askConfirm('Reset EVERYTHING to defaults? Your wins and history will be erased.',()=>{localStorage.removeItem('tcm_v1');location.reload();})">Reset all</button>
    </div></div>`;
  h+=`<p class="center muted" style="padding-bottom:10px;">Made with 💛 for ${esc(S.settings.name)} — The ${esc(S.settings.name)} Method, v4.4 🍯</p>`;
  return h;
}
function editBlock(bi){
  const b=(bi===null||bi===undefined)?null:S.routines[editDay][bi];
  const tasksStr=b?b.tasks.map(t=>t.t).join("\n"):"";
  openModal(`<h2>${b?"✎ Edit block":"➕ New block"} · ${DAYN[editDay]}</h2>
  <label class="muted">Block name</label>
  <input type="text" id="blk-n" value="${b?esc(b.n):""}" placeholder="e.g. Errands">
  <div class="row">
    <div style="flex:1;"><label class="muted">Start</label><input type="time" id="blk-s" value="${b?b.s:"09:00"}"></div>
    <div style="flex:1;"><label class="muted">End</label><input type="time" id="blk-e" value="${b?b.e:"10:00"}"></div>
  </div>
  <label class="muted">Tasks — one per line</label>
  <textarea id="blk-t" style="min-height:110px;" placeholder="First task&#10;Second task">${esc(tasksStr)}</textarea>
  <div class="row" style="margin:8px 0 0;">
    <label style="display:flex;align-items:center;gap:5px;font-size:13.5px;"><input type="checkbox" id="blk-w"${b&&b.workout?" checked":""}> 💪 Workout card</label>
    <label style="display:flex;align-items:center;gap:5px;font-size:13.5px;"><input type="checkbox" id="blk-b"${b&&b.bible?" checked":""}> 📖 Verse card</label>
    <label style="display:flex;align-items:center;gap:5px;font-size:13.5px;"><input type="checkbox" id="blk-p"${b&&b.prot?" checked":""}> 🚫 No phones</label>
  </div>
  <div class="row" style="margin-top:10px;">
    <button class="pill gold" onclick="saveBlockFull(${b?bi:"null"})">Save</button>
    <button class="pill ghost" onclick="closeModal()">Cancel</button>
  </div>`);
}
function saveBlockFull(bi){
  const n=$("#blk-n").value.trim(); if(!n){toast("Give it a name 💛");return;}
  const s=$("#blk-s").value||"09:00", e=$("#blk-e").value||"10:00";
  const old=(bi===null)?null:S.routines[editDay][bi];
  const lines=$("#blk-t").value.split("\n").map(x=>x.trim()).filter(Boolean);
  const tasks=lines.map((txt,i)=>{
    const prev=old&&old.tasks.find(t=>t.t===txt); // keep ids (and flags) for unchanged tasks so history survives
    return prev?prev:{id:"t"+editDay+"-"+Date.now()+"-"+i,t:txt};
  });
  const obj=Object.assign({},old||{},{n,s,e,tasks,
    workout:$("#blk-w").checked||undefined,
    bible:$("#blk-b").checked||undefined,
    prot:$("#blk-p").checked||undefined});
  if(bi!==null) S.routines[editDay][bi]=obj;
  else S.routines[editDay].push(obj);
  S.routines[editDay].sort((a,b2)=>tMin(a.s)-tMin(b2.s));
  save(); closeModal(); toast("Block saved ✓"); render();
}
function copyMonToWeek(){
  for(let d2=2;d2<=5;d2++) S.routines[d2]=JSON.parse(JSON.stringify(S.routines[1]));
  save(); toast("Monday copied to Tue–Fri 📋"); render();
}
function copyAlarms(){
  const txt="The Chelsea Method — iPhone alarms:\n⏰ 5:00 AM, Mon–Fri — Rise & shine\n📚 7:00 AM, Wednesdays — Send the tutoring link\n(optional) 12:30 PM & 3:30 PM, Mon–Fri — check-in nudges";
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>toast("Copied — paste into Notes or Reminders 📋")).catch(()=>toast("Couldn't copy on this browser"));
  } else toast("Couldn't copy on this browser");
}
function editTask(bi,ti){
  const t=S.routines[editDay][bi].tasks[ti];
  askText("✎ Edit task","",t.t,v=>{ if(v&&v.trim()){t.t=v.trim();save();} render(); });
}
function addTask(bi){
  askText("➕ New task","e.g. Water the plants","",v=>{ if(v&&v.trim()){
    S.routines[editDay][bi].tasks.push({id:"t"+Date.now(),t:v.trim()}); save(); } render(); });
}
function editBlockTimes(bi){
  const b=S.routines[editDay][bi];
  openModal(`<h2>🕐 ${esc(b.n)}</h2>
  <label class="muted">Start</label><input type="time" id="bt-s" value="${b.s}">
  <label class="muted">End</label><input type="time" id="bt-e" value="${b.e}">
  <div class="row" style="margin-top:6px;"><button class="pill gold" onclick="saveBlockTimes(${bi})">Save</button>
  <button class="pill ghost" onclick="closeModal()">Cancel</button></div>`);
}
function saveBlockTimes(bi){
  const b=S.routines[editDay][bi];
  const s=$("#bt-s").value,e=$("#bt-e").value;
  if(s&&e){ b.s=s; b.e=e; S.routines[editDay].sort((a,b2)=>tMin(a.s)-tMin(b2.s)); save(); }
  closeModal(); render();
}
function addBlock(){
  openModal(`<h2>➕ New block for ${DAYN[editDay]}</h2>
  <input type="text" id="nb-n" placeholder="Block name (e.g. Errands)">
  <label class="muted">Start</label><input type="time" id="nb-s" value="09:00">
  <label class="muted">End</label><input type="time" id="nb-e" value="10:00">
  <div class="row" style="margin-top:6px;"><button class="pill gold" onclick="saveNewBlock()">Add block</button>
  <button class="pill ghost" onclick="closeModal()">Cancel</button></div>`);
}
function saveNewBlock(){
  const n=$("#nb-n").value.trim(); if(!n){toast("Give it a name 💛");return;}
  S.routines[editDay].push({n,s:$("#nb-s").value||"09:00",e:$("#nb-e").value||"10:00",tasks:[]});
  S.routines[editDay].sort((a,b)=>tMin(a.s)-tMin(b.s));
  save(); closeModal(); render();
}
function exportData(){
  const blob=new Blob([JSON.stringify(S,null,1)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="chelsea-method-backup-"+todayKey()+".json";
  a.click(); toast("Backup saved 💾");
}
function importData(inp){
  const f=inp.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result);
      if(d&&d.settings&&d.routines){ S=d; save(); toast("Restored! Welcome back 💛"); render(); }
      else toast("That doesn't look like a backup file.");
    }catch(e){ toast("Couldn't read that file."); } };
  r.readAsText(f);
}
/* ---------- boot ---------- */
load();
render();
setInterval(()=>{ if(VIEW==="today"&&!$("#overlay").classList.contains("show")&&document.activeElement.tagName!=="INPUT"&&document.activeElement.tagName!=="TEXTAREA") render(); },60000);
</script>
